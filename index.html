<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magnetics — Field Lab</title>
  <meta name="description" content="Physics-accurate interactive magnetic field simulator: permanent magnets, electromagnets, moving charges and Lorentz-force particle dynamics.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%8C%81%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
  <h1>⌁ Magnetics</h1>
  <div class="topctrl">
    <select id="presetSel" title="Scenario"></select>
    <label>Plane <select id="planeSel"></select></label>
    <label>Slice <input id="sliceInput" type="number" value="0" step="1" style="width:52px"> <span class="lc">mm</span></label>
    <label>Units <select id="unitSel"></select></label>
    <label title="Snap to grid"><input type="checkbox" id="snapChk"> Snap
      <input id="snapStep" type="number" value="1" step="0.5" min="0.5" style="width:44px"> <span class="lc">mm</span></label>
  </div>
</header>

<div id="app">
  <aside id="left">
    <section>
      <h2>Field probe</h2>
      <div id="probeReadout" class="readout mono">Drag the ⊕ pin to read B</div>
    </section>
    <section>
      <h2>Force &amp; torque</h2>
      <div id="forceReadout" class="readout mono">Select an object</div>
    </section>
    <section>
      <h2>Particle data</h2>
      <div id="partReadout" class="readout mono">Launch a particle</div>
    </section>
    <section>
      <h2>Particle</h2>
      <div class="prow">
        <select id="pType"><option value="electron">e⁻</option><option value="proton">p⁺</option></select>
        <label>Speed <input id="pSpeed" type="number" value="3000000" step="1e5" style="width:92px"> <span class="lc">m/s</span></label>
      </div>
      <div class="prow">
        <button id="launch" class="primary">Launch</button>
        <button id="pauseSim">Pause</button>
        <button id="clearParts">Clear</button>
      </div>
    </section>
    <section>
      <h2>Layers</h2>
      <label class="chk"><input type="checkbox" id="tglHeat"> Heatmap</label>
      <label class="chk"><input type="checkbox" id="tglLines"> Field lines</label>
      <label class="chk"><input type="checkbox" id="tglVec"> Arrows</label>
      <label class="chk"><input type="checkbox" id="tglGrid"> Grid</label>
    </section>
  </aside>

  <main>
    <div id="canvasWrap">
      <canvas id="view"></canvas>
      <div id="zoomCtrl">
        <button id="zoomIn" title="Zoom in">＋</button>
        <button id="zoomOut" title="Zoom out">－</button>
        <button id="zoomFit" title="Fit">Fit</button>
        <button id="zoomReset" title="Reset">⟲</button>
      </div>
      <div id="axisBadge"><span id="axV">Z</span>↑ &nbsp; <span id="axU">X</span>→</div>
    </div>
  </main>

  <aside id="right">
    <section>
      <h2>Add</h2>
      <div class="addgrid">
        <button data-add="magnet">Bar</button>
        <button data-add="cylinder">Disc</button>
        <button data-add="sphere">Sphere</button>
        <button data-add="coil">Coil</button>
        <button data-add="loop">Loop</button>
        <button data-add="wire">Wire</button>
        <button data-add="dipole">Dipole</button>
        <button data-add="charge">Charge</button>
      </div>
    </section>
    <section>
      <h2>Objects</h2>
      <div id="objlist"></div>
      <button id="clearAll" class="danger" style="margin-top:8px;width:100%">Clear all</button>
    </section>
    <section>
      <h2>Inspector</h2>
      <div id="inspector"></div>
    </section>
  </aside>
</div>

<script type="module" src="src/main.js"></script>
</body>
</html>
